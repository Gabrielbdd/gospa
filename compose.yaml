services:
  postgres:
    image: ${GOFRA_POSTGRES_IMAGE:-postgres:18.3-alpine3.23}
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: ${GOFRA_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${GOFRA_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${GOFRA_DB_NAME:-gospa}
    ports:
      - "${GOFRA_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --dbname=$${POSTGRES_DB} --username=$${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  zitadel:
    image: ${GOSPA_ZITADEL_IMAGE:-ghcr.io/zitadel/zitadel:stable}
    restart: unless-stopped
    command: start-from-init --masterkeyFromEnv --tlsMode disabled --steps /zitadel/steps.yaml
    environment:
      ZITADEL_MASTERKEY: ${GOSPA_ZITADEL_MASTERKEY:-MasterkeyNeedsToHave32Characters}
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALDOMAIN: ${GOSPA_ZITADEL_EXTERNAL_DOMAIN:-localhost}
      ZITADEL_EXTERNALPORT: ${GOSPA_ZITADEL_PORT:-8081}
      ZITADEL_PORT: "8080"
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${GOFRA_DB_USER:-postgres}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${GOFRA_DB_PASSWORD:-postgres}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
    ports:
      - "${GOSPA_ZITADEL_PORT:-8081}:8080"
    volumes:
      - ./infra/zitadel/steps.yaml:/zitadel/steps.yaml:ro
      - ./.secrets/zitadel-provisioner-raw:/zitadel-secrets
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
