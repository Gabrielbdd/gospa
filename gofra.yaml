# Configuration overrides. Proto defaults apply when a key is omitted here.
# See proto/gospa/config/v1/config.proto for the full schema.
app:
  name: gospa
  port: 3000

database:
  dsn: "postgres://postgres:postgres@localhost:5432/gospa?sslmode=disable"
  auto_migrate: true

# Auth is opt-in. Uncomment and configure once ZITADEL is running.
# auth:
#   issuer: "http://localhost:8081"
#   audience: "<ZITADEL project ID for API application>"

# Zitadel provisioning. The defaults line up with the local docker-compose
# setup (ZITADEL on :8081 + PAT at ./.secrets/zitadel-provisioner.pat). The
# app refuses to start if provisioner_pat_file does not resolve to a non-
# empty file — `mise run infra` materialises that file on first boot.
# Override with GOSPA_ZITADEL_PROVISIONER_PAT_FILE for Kubernetes mounts.
# zitadel:
#   admin_api_url: "http://localhost:8081"
#   provisioner_pat_file: ".secrets/zitadel-provisioner.pat"
