# Provisioner PAT for the Gospa deployment. Replace the placeholder
# below with a real token. Operators typically generate the PAT with
# the IAM_OWNER grant on a ZITADEL service account and manage the
# Secret via their secrets-management tool of choice (ExternalSecrets,
# Vault, sealed-secrets, etc.). The example here is plain stringData
# so it is readable at a glance.
apiVersion: v1
kind: Secret
metadata:
  name: gospa-zitadel-provisioner
  labels:
    app.kubernetes.io/name: gospa
    app.kubernetes.io/component: credentials
type: Opaque
stringData:
  pat: "REPLACE_WITH_ZITADEL_PAT"
---
# Install token (bootstrap secret) for the public /install handler.
# The wizard requires this value in the X-Install-Token header before
# Gospa accepts the provisioning request. Without it, anyone reaching
# the URL during the install window could hijack the workspace into
# their own ZITADEL.
#
# Generate any high-entropy string (32+ hex chars recommended):
#   openssl rand -hex 16
apiVersion: v1
kind: Secret
metadata:
  name: gospa-install-token
  labels:
    app.kubernetes.io/name: gospa
    app.kubernetes.io/component: credentials
type: Opaque
stringData:
  token: "REPLACE_WITH_HIGH_ENTROPY_HEX"
