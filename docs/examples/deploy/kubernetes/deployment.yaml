apiVersion: apps/v1
kind: Deployment
metadata:
  name: gospa
  labels:
    app.kubernetes.io/name: gospa
    app.kubernetes.io/component: app
spec:
  # Install orchestrator uses an in-process single-flight guard, so run
  # one replica until the workspace is installed. Scaling up after
  # install is safe for regular traffic; revisit when Restate is wired in.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gospa
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gospa
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: gospa
          image: ghcr.io/gabrielbdd/gospa:edge
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            # --- Hard startup contract ---------------------------------
            # cmd/app refuses to start unless the file below is a
            # non-empty provisioner PAT with IAM_OWNER on the ZITADEL
            # instance reached by GOFRA_ZITADEL__ADMIN_API_URL.
            - name: GOSPA_ZITADEL_PROVISIONER_PAT_FILE
              value: /etc/gospa/zitadel/provisioner.pat

            # --- Install token (bootstrap secret) ----------------------
            # Required in the X-Install-Token header on POST /install.
            # Without it, /install rejects requests with Unauthenticated.
            # If neither this env nor GOSPA_INSTALL_TOKEN_FILE is set,
            # cmd/app generates a token at startup and logs it — fine
            # for try-it-out, unsuitable for any persistent deploy
            # because a Pod restart invalidates the previously issued
            # token.
            - name: GOSPA_INSTALL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gospa-install-token
                  key: token

            # --- ZITADEL the app provisions into -----------------------
            # The admin URL the /install orchestrator hits to create the
            # MSP org, project, and OIDC SPA application. Post-install,
            # the same URL becomes the JWT issuer the middleware
            # validates tokens against.
            - name: GOFRA_ZITADEL__ADMIN_API_URL
              value: "https://auth.example.com"

            # --- Public base URL the browser sees ----------------------
            # Used as the origin when the /install orchestrator writes
            # the OIDC SPA application's redirect URIs into ZITADEL, and
            # as the API base the SPA calls back to. Must match the
            # Ingress / LoadBalancer host.
            - name: GOFRA_PUBLIC__API_BASE_URL
              value: "https://gospa.example.com"

            # --- SPA-facing ZITADEL (login authorize URL) --------------
            # The SPA reads auth.issuer from /_gofra/config.js to build
            # the authorize URL. Usually the same as the admin URL; set
            # separately if ZITADEL is reached through a different
            # hostname from the browser vs the cluster.
            - name: GOFRA_PUBLIC__AUTH__ISSUER
              value: "https://auth.example.com"

            # --- Database ----------------------------------------------
            # Point at your managed Postgres. SSL mode should match what
            # the managed service requires (most cloud offerings need
            # `require` or `verify-full`).
            - name: GOFRA_DATABASE__DSN
              valueFrom:
                secretKeyRef:
                  name: gospa-database
                  key: dsn
          volumeMounts:
            - name: zitadel-pat
              mountPath: /etc/gospa/zitadel
              readOnly: true
          startupProbe:
            httpGet:
              path: /startupz
              port: http
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: zitadel-pat
          secret:
            secretName: gospa-zitadel-provisioner
            items:
              - key: pat
                path: provisioner.pat
                mode: 0400
