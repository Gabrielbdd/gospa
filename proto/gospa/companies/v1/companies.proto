syntax = "proto3";

package gospa.companies.v1;

// CompaniesService manages the MSP's customer companies. Each company maps
// eagerly to a ZITADEL organization; creating a company implies creating
// its org and persisting the zitadel_org_id on the company row. If org
// creation fails, the company row is not persisted.
service CompaniesService {
  rpc CreateCompany(CreateCompanyRequest) returns (CreateCompanyResponse);
  rpc ListCompanies(ListCompaniesRequest) returns (ListCompaniesResponse);
  rpc ArchiveCompany(ArchiveCompanyRequest) returns (ArchiveCompanyResponse);
}

message Company {
  string id = 1;
  string name = 2;
  // Field 3 (slug) removed in Wave 1 of the slug removal plan. The DB
  // column stays temporarily; Slice 7 drops it.
  reserved 3;
  reserved "slug";
  string zitadel_org_id = 4;
  string created_at = 5; // RFC3339
  string archived_at = 6; // RFC3339, empty when active
}

message CreateCompanyRequest {
  string name = 1;
  // Field 2 (slug) removed in Wave 1 of the slug removal plan.
  reserved 2;
  reserved "slug";
}

message CreateCompanyResponse {
  Company company = 1;
}

message ListCompaniesRequest {}

message ListCompaniesResponse {
  repeated Company companies = 1;
}

message ArchiveCompanyRequest {
  string id = 1;
}

message ArchiveCompanyResponse {}
