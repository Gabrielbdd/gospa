<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gospa</title>
    <script src="/_gofra/config.js"></script>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      body {
        margin: 0;
        background: #f4f1ea;
        color: #13212d;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2.5rem;
      }

      p {
        line-height: 1.6;
      }

      pre {
        overflow: auto;
        padding: 16px;
        border-radius: 16px;
        background: #13212d;
        color: #f4f1ea;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="app-name">gospa</h1>
      <p>
        This is the current minimal starter generated by <code>gofra new</code>.
        It already proves the framework-to-app boundary for runtime config.
      </p>
      <p>
        API base URL:
        <code id="api-base-url">loading…</code>
      </p>
      <pre id="runtime-config">loading runtime config…</pre>
    </main>
    <script>
      const runtimeConfig = window.__GOFRA_CONFIG__ ?? {};
      const appName = runtimeConfig.appName ?? "gospa";

      document.title = appName;
      document.getElementById("app-name").textContent = appName;
      document.getElementById("api-base-url").textContent =
        runtimeConfig.apiBaseUrl ?? "not set";
      document.getElementById("runtime-config").textContent = JSON.stringify(
        runtimeConfig,
        null,
        2,
      );
    </script>
  </body>
</html>
