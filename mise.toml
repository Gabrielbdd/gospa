[tools]
go = "1.25"
node = "22"

[tasks.generate]
description = "Generate config code (Go + TS) from proto"
run = """
GOWORK=off GOFLAGS=-mod=mod go run github.com/Gabrielbdd/gofra/cmd/gofra generate config \
  -runtime github.com/Gabrielbdd/gofra/runtime/config \
  -ts-out web/src/gen \
  proto/gospa/config/v1/config.proto
GOWORK=off go mod tidy
"""

[tasks.test]
description = "Run the application test suite"
depends = ["generate"]
run = "go test ./..."

[tasks."web:install"]
description = "Install frontend dependencies"
run = "cd web && npm install"
sources = ["web/package.json"]
outputs = ["web/node_modules/.package-lock.json"]

[tasks."web:dev"]
description = "Start Vite dev server at :5173 (run alongside `mise run dev` in another terminal)"
depends = ["generate"]
run = "cd web && npm install && npm run dev"

[tasks."web:build"]
description = "Build the frontend into web/dist so the Go binary can embed it"
depends = ["generate"]
run = "cd web && npm install && npm run build"

[tasks.build]
description = "Build the Go binary (embeds web/dist)"
depends = ["generate", "web:build"]
run = "go build -o bin/gospa ./cmd/app"

[tasks."gen:sql"]
description = "Generate Go code from SQL queries via sqlc"
run = "sqlc generate"
sources = ["db/queries/*.sql", "db/migrations/*.sql", "sqlc.yaml"]
outputs = ["db/sqlc/*.go"]

[tasks."gen:proto"]
description = "Generate Go + TS code from RPC .proto files via buf"
run = "buf generate"
sources = ["proto/**/*.proto", "buf.gen.yaml", "buf.yaml"]
outputs = ["gen/**/*.go"]

[tasks."dev:api"]
description = "Run only the Go backend (no frontend)"
depends = ["generate"]
run = """
. ./scripts/load-env.sh
go run ./cmd/app
"""

[tasks.dev]
description = "Run the Go backend and the Vite dev server together (Ctrl+C stops both)"
depends = ["generate"]
run = """
. ./scripts/load-env.sh

# Pre-install web deps synchronously so the parallel start is clean.
(cd web && npm install --no-audit --no-fund --ignore-scripts >/dev/null)

trap 'kill 0 2>/dev/null || true' INT TERM EXIT

(cd web && npm run dev) &
go run ./cmd/app &
wait
"""

[tasks.infra]
description = "Start local infrastructure (PostgreSQL + ZITADEL), wait, and materialise the provisioner PAT"
run = """
. ./scripts/load-env.sh
sh ./scripts/compose.sh up -d
sh ./scripts/wait-for-postgres.sh
sh ./scripts/wait-for-zitadel.sh
sh ./scripts/copy-provisioner-pat.sh
"""

[tasks."infra:stop"]
description = "Stop infrastructure services"
run = """
. ./scripts/load-env.sh
sh ./scripts/compose.sh down --remove-orphans
"""

[tasks."infra:reset"]
description = "Stop infrastructure services, delete data volumes, and wipe the materialised provisioner PAT"
run = """
. ./scripts/load-env.sh
sh ./scripts/compose.sh down --volumes --remove-orphans
rm -f .secrets/zitadel-provisioner.pat
# The old bind-mount location from pre-fix checkouts. Safe to remove
# repeatedly; does nothing when the directory is already gone.
rm -rf .secrets/zitadel-provisioner-raw
"""

[tasks."infra:logs"]
description = "Tail infrastructure logs"
run = """
. ./scripts/load-env.sh
sh ./scripts/compose.sh logs -f
"""

[tasks.migrate]
description = "Run pending database migrations"
run = """
. ./scripts/load-env.sh
goose -dir db/migrations postgres "$DATABASE_URL" up
"""

[tasks."migrate:create"]
description = "Create a new migration file"
run = "goose -dir db/migrations create {{arg(i=0)}} sql"

[tasks."migrate:down"]
description = "Rollback the last migration"
run = """
. ./scripts/load-env.sh
goose -dir db/migrations postgres "$DATABASE_URL" down
"""

[tasks."migrate:status"]
description = "Show migration status"
run = """
. ./scripts/load-env.sh
goose -dir db/migrations postgres "$DATABASE_URL" status
"""

[tasks.seed]
description = "Seed the database with development data"
run = """
. ./scripts/load-env.sh
goose -dir db/seeds --no-versioning postgres "$DATABASE_URL" up
"""
